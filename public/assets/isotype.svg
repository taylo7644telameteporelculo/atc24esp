<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ATC24 Español isotype">
  <defs>
    <radialGradient id="iso-bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0E2F4C"></stop>
      <stop offset="100%" stop-color="#02060B"></stop>
    </radialGradient>
    <filter id="iso-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.6" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#iso-bg)"></rect>
  
  <g stroke="#3A6B8C" stroke-opacity=".55" stroke-width="0.6" fill="none">
    <line x1="6" y1="14" x2="58" y2="50"></line>
    <line x1="58" y1="14" x2="6" y2="50"></line>
    <line x1="6" y1="32" x2="58" y2="32" stroke-dasharray="2 4"></line>
  </g>
  
  <line x1="22" y1="40" x2="36" y2="24" stroke="#3DDC97" stroke-width="1" stroke-opacity=".9"></line>
  
  <g transform="translate(22 40)" filter="url(#iso-glow)">
    <rect x="-3.5" y="-3.5" width="7" height="7" fill="none" stroke="#3DDC97" stroke-width="1.3"></rect>
    <line x1="0" y1="0" x2="-9" y2="-6" stroke="#3DDC97" stroke-width="1" stroke-opacity=".8"></line>
    <circle r="1.2" fill="#3DDC97"></circle>
  </g>
  
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="6" fill="#3DDC97" filter="url(#iso-glow)" font-weight="700" letter-spacing="0.4">
    <text x="36" y="24">ATC</text>
    <text x="36" y="32">24</text>
  </g>
</svg>